version: '3.8'

services:
  openclaw:
    image: node:24-slim
    container_name: openclaw
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3100:3000"
    env_file:
      - .env
    volumes:
      - openclaw-data:/app/data
      - ./config:/app/config
      - ./scripts/entrypoint.sh:/app/entrypoint.sh
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    networks:
      - openclaw-net
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openclaw-data:

networks:
  openclaw-net:
    driver: bridge
