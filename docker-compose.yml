version: '3.8'

services:
  openclaw:
    image: node:24-slim
    container_name: openclaw
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3100:3000"
    env_file:
      - .env
    environment:
      - FEEDBACK_API_URL=http://career-api:3456
    volumes:
      - openclaw-data:/app/data
      - ./config:/app/config
      - ./config/soul.md:/app/data/SOUL.md
      - ./config/heartbeat.md:/app/data/HEARTBEAT.md
      - ./scripts/entrypoint.sh:/app/entrypoint.sh
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    networks:
      - openclaw-net
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      career-api:
        condition: service_healthy

  career-api:
    build:
      context: ./feedback-api
      dockerfile: Dockerfile
    container_name: career-api
    restart: unless-stopped
    ports:
      - "3456:3456"
    volumes:
      - feedback-data:/app/data
    environment:
      - FEEDBACK_DB_PATH=/app/data/feedback.db
      - FEEDBACK_API_PORT=3456
    networks:
      - openclaw-net
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3456/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  openclaw-data:
  feedback-data:

networks:
  openclaw-net:
    driver: bridge
